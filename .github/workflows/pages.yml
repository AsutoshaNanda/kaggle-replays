name: Deploy site to GitHub Pages

# Publishes the static project site in docs/ (the landing/showcase page) to
# GitHub Pages. This deploys the SHOWCASE site only — not the live application,
# which authenticates to Kaggle as you and must not run on a public server.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build type "workflow") on first run so this step
          # does not 404 with "Get Pages site failed" when Pages is not yet
          # enabled. Requires the `pages: write` permission set above.
          enablement: true
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
